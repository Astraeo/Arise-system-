<!DOCTYPE html>
<html>
<head>
  <title>ARISE SYSTEM GPS</title>
  <style>
    body{
      background:black;
      color:#00ffcc;
      text-align:center;
      font-family:Arial;
      padding-top:40px;
    }

    .box{
      border:1px solid #00ffcc;
      margin:15px;
      padding:20px;
      border-radius:10px;
    }

    h1{
      margin-bottom:20px;
    }
  </style>
</head>

<body>

<h1>ARISE SYSTEM</h1>

<div class="box">
  <h2>LEVEL: <span id="level">1</span></h2>
  <h2>XP: <span id="xp">0</span> / 100</h2>
</div>

<div class="box">
  <h3>GPS QUEST</h3>
  <p>Target: 0.1 KM WALK</p>
  <p>Distance: <span id="distance">0</span> km</p>
  <p id="status">Initializing GPS...</p>
</div>

<script>

/* =======================
   LOAD SAVED DATA
======================= */
let xp = localStorage.getItem("xp") ? parseInt(localStorage.getItem("xp")) : 0;
let level = localStorage.getItem("level") ? parseInt(localStorage.getItem("level")) : 1;

let totalDistance = localStorage.getItem("distance")
  ? parseFloat(localStorage.getItem("distance"))
  : 0;

/* GPS variables */
let lastPos = null;
let watchId;

/* =======================
   SAVE FUNCTIONS
======================= */
function saveData(){
  localStorage.setItem("xp", xp);
  localStorage.setItem("level", level);
}

function saveDistance(){
  localStorage.setItem("distance", totalDistance);
}

/* =======================
   UPDATE UI
======================= */
function updateUI(){
  document.getElementById("xp").innerText = xp;
  document.getElementById("level").innerText = level;
  document.getElementById("distance").innerText = totalDistance.toFixed(3);
}

/* =======================
   DISTANCE CALC (Haversine)
======================= */
function getDistance(lat1, lon1, lat2, lon2){
  const R = 6371;

  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  let dist = R * c;

  // noise filter (important)
  if(dist < 0.005) return 0;

  return dist;
}

/* =======================
   QUEST COMPLETE
======================= */
function completeQuest(){
  xp += 50;

  if(xp >= 100){
    xp -= 100;
    level++;
    alert("LEVEL UP!");
  }

  saveData();
  updateUI();

  document.getElementById("status").innerText = "QUEST COMPLETED!";
}

/* =======================
   GPS START
======================= */
function startGPS(){
  if(!navigator.geolocation){
    alert("GPS not supported");
    return;
  }

  document.getElementById("status").innerText = "GPS Active...";

  watchId = navigator.geolocation.watchPosition(pos => {

    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    if(lastPos){
      let dist = getDistance(lastPos.lat, lastPos.lon, lat, lon);

      // add distance safely
      if(dist > 0 && dist < 1){
        totalDistance += dist;

        // SAVE PROGRESS (IMPORTANT FIX)
        saveDistance();
      }

      document.getElementById("distance").innerText =
        totalDistance.toFixed(3);

      document.getElementById("status").innerText =
        "Tracking... Keep moving 👣";

      // QUEST CHECK
      if(totalDistance >= 0.1){
        completeQuest();
        stopGPS();
      }
    }

    lastPos = {lat, lon};

  }, err => {
    document.getElementById("status").innerText =
      "Enable GPS Permission!";
  }, { enableHighAccuracy:true });
}

/* =======================
   STOP GPS
======================= */
function stopGPS(){
  if(watchId){
    navigator.geolocation.clearWatch(watchId);
  }
}

/* =======================
   INIT
======================= */
updateUI();
startGPS();

</script>

</body>
</html>
