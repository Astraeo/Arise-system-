<!DOCTYPE html>
<html>
<head>
  <title>ARISE SYSTEM</title>
  <style>
    body{
      background:#000;
      color:#00ffcc;
      font-family:Arial;
      text-align:center;
      padding:20px;
    }

    .panel{
      border:1px solid #00ffcc;
      border-radius:12px;
      margin:10px;
      padding:15px;
      box-shadow:0 0 10px #00ffcc33;
    }

    button{
      background:#00ffcc;
      border:none;
      padding:10px;
      margin:5px;
      font-weight:bold;
      cursor:pointer;
    }

    .quest{
      margin:5px;
      padding:10px;
      border:1px solid #00ffcc55;
      border-radius:8px;
    }

    .active{
      background:#00ffcc22;
    }
  </style>
</head>

<body>

<h1>⚡ ARISE SYSTEM ⚡</h1>

<div class="panel">
  <h2>LEVEL: <span id="level">1</span></h2>
  <h2>XP: <span id="xp">0</span> / 100</h2>
</div>

<div class="panel">
  <h2>🎯 QUEST SELECT</h2>

  <div class="quest" onclick="setQuest(0.1)">
    🏃 Walk 0.1 KM
  </div>

  <div class="quest" onclick="setQuest(0.5)">
    🚶 Walk 0.5 KM
  </div>

  <div class="quest" onclick="setQuest(1)">
    🏃 Run 1 KM
  </div>
</div>

<div class="panel">
  <h2>ACTIVE QUEST</h2>
  <p id="activeQuest">None</p>
  <p>Distance: <span id="distance">0</span> km</p>
  <p id="status">Select a quest</p>
</div>

<script>

/* ================= DATA ================= */
let xp = localStorage.getItem("xp") ? parseInt(localStorage.getItem("xp")) : 0;
let level = localStorage.getItem("level") ? parseInt(localStorage.getItem("level")) : 1;

let totalDistance = localStorage.getItem("distance") ? parseFloat(localStorage.getItem("distance")) : 0;

let targetDistance = 0;
let lastPos = null;
let watchId;

/* ================= SAVE ================= */
function saveData(){
  localStorage.setItem("xp", xp);
  localStorage.setItem("level", level);
  localStorage.setItem("distance", totalDistance);
}

/* ================= UI ================= */
function updateUI(){
  document.getElementById("xp").innerText = xp;
  document.getElementById("level").innerText = level;
  document.getElementById("distance").innerText = totalDistance.toFixed(3);
}

/* ================= QUEST SELECT ================= */
function setQuest(km){
  targetDistance = km;
  totalDistance = 0;
  saveData();

  document.getElementById("activeQuest").innerText =
    "Complete " + km + " KM quest";

  document.getElementById("status").innerText =
    "Quest Started... Move now!";
}

/* ================= DISTANCE ================= */
function getDistance(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI/180;
  const dLon = (lon2 - lon1) * Math.PI/180;

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  let dist = R * c;

  if(dist < 0.005) return 0;
  return dist;
}

/* ================= QUEST COMPLETE ================= */
function completeQuest(){
  xp += 50;

  if(xp >= 100){
    xp -= 100;
    level++;
    alert("LEVEL UP!");
  }

  saveData();
  updateUI();

  document.getElementById("status").innerText =
    "QUEST COMPLETE!";
}

/* ================= GPS ================= */
function startGPS(){
  if(!navigator.geolocation){
    alert("GPS not supported");
    return;
  }

  watchId = navigator.geolocation.watchPosition(pos => {

    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    if(lastPos){
      let dist = getDistance(lastPos.lat, lastPos.lon, lat, lon);

      if(dist > 0 && dist < 1){
        totalDistance += dist;
        saveData();
      }

      document.getElementById("distance").innerText =
        totalDistance.toFixed(3);

      document.getElementById("status").innerText =
        "Tracking... Keep moving 👣";

      if(targetDistance > 0 && totalDistance >= targetDistance){
        completeQuest();
        targetDistance = 0;
      }
    }

    lastPos = {lat, lon};

  }, err => {
    document.getElementById("status").innerText =
      "Enable GPS permission!";
  }, { enableHighAccuracy:true });
}

/* ================= INIT ================= */
updateUI();
startGPS();

</script>

</body>
</html>
