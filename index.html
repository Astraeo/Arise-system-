<!DOCTYPE html>
<html>
<head>
  <title>ARISE QUEST ENGINE</title>

  <style>
    body{
      margin:0;
      background: radial-gradient(circle at top, #001a1a, #000);
      color:#00ffcc;
      font-family:Arial;
      text-align:center;
      padding:15px;
    }

    h1{
      text-shadow:0 0 15px #00ffcc;
      letter-spacing:2px;
    }

    .panel{
      border:1px solid #00ffcc;
      border-radius:14px;
      margin:10px;
      padding:15px;
      box-shadow:0 0 20px #00ffcc22;
      backdrop-filter: blur(6px);
    }

    .btn{
      padding:10px;
      margin:5px;
      border:1px solid #00ffcc;
      background:transparent;
      color:#00ffcc;
      cursor:pointer;
      border-radius:8px;
    }

    .quest{
      border:1px solid #00ffcc55;
      margin:6px;
      padding:10px;
      border-radius:10px;
      cursor:pointer;
      transition:0.2s;
    }

    .quest:hover{
      background:#00ffcc11;
      transform:scale(1.03);
    }

    #system{
      font-weight:bold;
      text-shadow:0 0 10px #00ffcc;
      background:#001f1f;
    }
  </style>
</head>

<body>

<h1>⚡ ARISE QUEST ENGINE ⚡</h1>

<div class="panel" id="system">SYSTEM: BOOTING...</div>

<!-- LEVEL -->
<div class="panel">
  <h2>LEVEL: <span id="level">1</span></h2>
  <h2>XP: <span id="xp">0</span>/100</h2>
</div>

<!-- STATS -->
<div class="panel">
  <h3>📊 STATS</h3>
  💪 STR: <span id="str">1</span> |
  🫀 STA: <span id="sta">1</span> |
  ⚡ AGI: <span id="agi">1</span> |
  🔥 STREAK: <span id="streak">0</span>
</div>

<!-- CATEGORY SELECT -->
<div class="panel">
  <h2>SELECT TRAINING PATH</h2>

  <button class="btn" onclick="selectCategory('strength')">💪 STRENGTH</button>
  <button class="btn" onclick="selectCategory('stamina')">🫀 STAMINA</button>
  <button class="btn" onclick="selectCategory('agility')">⚡ AGILITY</button>
</div>

<!-- QUEST BOARD -->
<div class="panel">
  <h2>DAILY QUEST BOARD</h2>
  <div id="questBoard">Select a category</div>
</div>

<!-- ACTIVE -->
<div class="panel">
  <h2>ACTIVE QUEST</h2>
  <p id="activeQuest">None</p>
  <p id="status">Idle</p>
</div>

<script>

/* ================= DATA ================= */
let xp = localStorage.getItem("xp") ? parseInt(localStorage.getItem("xp")) : 0;
let level = localStorage.getItem("level") ? parseInt(localStorage.getItem("level")) : 1;

let str = localStorage.getItem("str") ? parseInt(localStorage.getItem("str")) : 1;
let sta = localStorage.getItem("sta") ? parseInt(localStorage.getItem("sta")) : 1;
let agi = localStorage.getItem("agi") ? parseInt(localStorage.getItem("agi")) : 1;

let streak = localStorage.getItem("streak") ? parseInt(localStorage.getItem("streak")) : 0;
let lastLogin = localStorage.getItem("lastLogin") || "";

let selectedCategory = "";
let activeQuest = "";

/* ================= SYSTEM ================= */
function system(msg){
  document.getElementById("system").innerText = "SYSTEM: " + msg;
}

/* ================= SAVE ================= */
function save(){
  localStorage.setItem("xp", xp);
  localStorage.setItem("level", level);
  localStorage.setItem("str", str);
  localStorage.setItem("sta", sta);
  localStorage.setItem("agi", agi);
  localStorage.setItem("streak", streak);
  localStorage.setItem("lastLogin", lastLogin);
}

/* ================= DIFFICULTY ================= */
function scale(base){
  return Math.floor(base + (level * 0.2 * base));
}

/* ================= QUEST POOLS ================= */
function getQuests(type){

  if(type === "strength"){
    return [
      `Push-ups (${scale(10)} reps)`,
      `Squats (${scale(15)} reps)`,
      `Plank (${scale(30)} sec)`,
      `Burpees (${scale(10)} reps)`
    ];
  }

  if(type === "stamina"){
    return [
      `Jog ${ (0.3 + level*0.05).toFixed(1) } km`,
      `Walk ${ (0.5 + level*0.1).toFixed(1) } km`,
      `Fast walk 10 min`,
      `Endurance walk 15 min`
    ];
  }

  if(type === "agility"){
    return [
      `Sprint intervals (5 rounds)`,
      `Fast walk drills (10 min)`,
      `Jump training (50 reps)`,
      `Speed walk challenge`
    ];
  }

  return [];
}

/* ================= CATEGORY ================= */
function selectCategory(cat){
  selectedCategory = cat;
  system(cat.toUpperCase() + " PATH SELECTED");
  generateBoard();
}

/* ================= BOARD ================= */
function generateBoard(){

  let quests = getQuests(selectedCategory);
  let board = "";

  for(let i=0;i<quests.length;i++){
    board += `<div class='quest' onclick="startQuest('${quests[i]}')">
      ${quests[i]}
    </div>`;
  }

  document.getElementById("questBoard").innerHTML = board;
}

/* ================= START QUEST ================= */
function startQuest(q){
  activeQuest = q;

  document.getElementById("activeQuest").innerText = q;
  document.getElementById("status").innerText = "QUEST STARTED";

  system("QUEST INITIALIZED: " + selectedCategory.toUpperCase());
}

/* ================= COMPLETE ================= */
function completeQuest(){

  xp += 50;

  if(selectedCategory === "strength") str++;
  if(selectedCategory === "stamina") sta++;
  if(selectedCategory === "agility") agi++;

  if(xp >= 100){
    xp -= 100;
    level++;
    system("LEVEL UP ⚡");
  }

  save();

  system("QUEST COMPLETE ✔");

  generateBoard(); // 🔥 auto new quests after completion
}

/* ================= STREAK ================= */
function checkStreak(){
  let today = new Date().toDateString();

  if(lastLogin !== today){
    streak++;
    lastLogin = today;

    xp += 10;

    system("DAILY STREAK BONUS +10 XP");
    save();
  }
}

/* ================= DEMO COMPLETE BUTTON (TEMP TEST) ================= */
/* since GPS integration already exists in your previous version,
   this is placeholder for manual completion */
document.addEventListener("dblclick", completeQuest);

/* ================= INIT ================= */
checkStreak();

</script>

</body>
</html>
