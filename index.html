<!DOCTYPE html>
<html>
<head>
  <title>ARISE SYSTEM</title>

  <style>
    body{
      margin:0;
      background:black;
      color:#00ffcc;
      font-family:Arial;
      text-align:center;
    }

    .panel{
      border:1px solid #00ffcc;
      margin:10px;
      padding:10px;
      border-radius:10px;
    }

    .quest{
      border:1px solid #00ffcc55;
      margin:5px;
      padding:10px;
      cursor:pointer;
    }

    button{
      padding:10px;
      margin:5px;
    }

    /* CINEMATIC */
    #specialOverlay{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:black;
      color:#00ffcc;
      display:none;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      z-index:999;
      text-align:center;
    }

    .glow{
      text-shadow:0 0 20px #00ffcc;
    }

    /* AVATAR */
    #avatar{
      width:80px;
      height:80px;
      border-radius:50%;
      border:2px solid #00ffcc;
      margin:auto;
    }

    .frame-dark{
      box-shadow:0 0 20px purple;
    }

  </style>
</head>

<body>

<h1>⚡ ARISE SYSTEM ⚡</h1>

<div class="panel">
  <div id="avatar"></div>
  <p>LEVEL: <span id="level">1</span> | XP: <span id="xp">0</span></p>
</div>

<div class="panel">
  💪 <span id="str">1</span> |
  🫀 <span id="sta">1</span> |
  ⚡ <span id="agi">1</span> |
  🔥 <span id="streak">0</span>
</div>

<button onclick="toggleSound()">🔊 SOUND</button>

<div class="panel">
  <button onclick="selectCategory('strength')">Strength</button>
  <button onclick="selectCategory('stamina')">Stamina</button>
  <button onclick="selectCategory('agility')">Agility</button>
</div>

<div class="panel" id="questBoard"></div>

<div class="panel">
  ACTIVE: <span id="activeQuest">None</span><br>
  <button onclick="completeQuest()">COMPLETE</button>
</div>

<!-- SPECIAL QUEST -->
<div id="specialOverlay">
  <h2 class="glow">⚠️ SPECIAL QUEST ⚠️</h2>
  <p id="specialText"></p>
  <p id="specialTimer"></p>
  <button onclick="acceptSpecial()">ACCEPT</button>
  <button onclick="declineSpecial()">DECLINE</button>
</div>

<script>

/* DATA */
let xp = parseInt(localStorage.getItem("xp")) || 0;
let level = parseInt(localStorage.getItem("level")) || 1;

let str = parseInt(localStorage.getItem("str")) || 1;
let sta = parseInt(localStorage.getItem("sta")) || 1;
let agi = parseInt(localStorage.getItem("agi")) || 1;

let streak = parseInt(localStorage.getItem("streak")) || 0;
let lastLogin = localStorage.getItem("lastLogin") || "";

let selectedCategory = localStorage.getItem("category") || "";
let activeQuest = localStorage.getItem("activeQuest") || "";
let questBoard = JSON.parse(localStorage.getItem("questBoard")) || [];

let soundEnabled = localStorage.getItem("sound") !== "off";

/* SPECIAL */
let lastSpecial = parseInt(localStorage.getItem("lastSpecial")) || 0;
let specialActive = false;

/* SOUND */
function toggleSound(){
  soundEnabled = !soundEnabled;
  localStorage.setItem("sound", soundEnabled ? "on":"off");
  alert(soundEnabled ? "Sound ON":"Sound OFF");
}

/* VOICE */
function speak(text){
  if(!soundEnabled) return;
  let u = new SpeechSynthesisUtterance(text);
  u.rate=0.9;
  u.pitch=0.7;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

/* SAVE */
function save(){
  localStorage.setItem("xp", xp);
  localStorage.setItem("level", level);
  localStorage.setItem("str", str);
  localStorage.setItem("sta", sta);
  localStorage.setItem("agi", agi);
  localStorage.setItem("streak", streak);
  localStorage.setItem("lastLogin", lastLogin);
  localStorage.setItem("category", selectedCategory);
  localStorage.setItem("activeQuest", activeQuest);
  localStorage.setItem("questBoard", JSON.stringify(questBoard));
}

/* UI */
function updateUI(){
  document.getElementById("xp").innerText=xp;
  document.getElementById("level").innerText=level;
  document.getElementById("str").innerText=str;
  document.getElementById("sta").innerText=sta;
  document.getElementById("agi").innerText=agi;
  document.getElementById("streak").innerText=streak;
  document.getElementById("activeQuest").innerText=activeQuest;
}

/* QUEST */
function getQuests(cat){
  return ["Easy Task","Medium Task","Hard Task"];
}

function selectCategory(cat){
  selectedCategory=cat;
  generateBoard();
  save();
}

function generateBoard(){
  questBoard=[];
  let pool=getQuests(selectedCategory);
  for(let i=0;i<3;i++){
    questBoard.push(pool[Math.floor(Math.random()*pool.length)]);
  }
  renderBoard();
}

function renderBoard(){
  let html="";
  questBoard.forEach((q,i)=>{
    html+=`<div class='quest' onclick='startQuest(${i})'>${q}</div>`;
  });
  document.getElementById("questBoard").innerHTML=html;
}

function startQuest(i){
  activeQuest=questBoard[i];
  save();
  updateUI();
}

function completeQuest(){
  xp+=50;
  if(xp>=100){xp-=100;level++;speak("Level up");}
  activeQuest="";
  generateBoard();
  save();
  updateUI();
}

/* SPECIAL QUEST SYSTEM */
function trySpecial(){

  let now=Date.now();

  if(now - lastSpecial < 7*24*60*60*1000) return;

  if(Math.random() < 0.15){

    specialActive=true;
    lastSpecial=now;
    localStorage.setItem("lastSpecial", lastSpecial);

    document.getElementById("specialOverlay").style.display="flex";
    document.getElementById("specialText").innerText=
      "SSS QUEST: Complete 3 quests within 24 hours";

    speak("A special quest has been generated");
  }
}

function acceptSpecial(){
  specialActive=false;
  document.getElementById("specialOverlay").style.display="none";
  speak("Quest accepted");
}

function declineSpecial(){
  xp=Math.max(0,xp-30);
  streak=0;
  document.getElementById("specialOverlay").style.display="none";
  speak("Penalty applied");
  save();
  updateUI();
}

/* STREAK */
function checkStreak(){
  let today=new Date().toDateString();
  if(lastLogin!==today){
    streak++;
    lastLogin=today;
    xp+=10;
    save();
  }
}

/* INIT */
checkStreak();
updateUI();
renderBoard();
trySpecial();

</script>

</body>
</html>
