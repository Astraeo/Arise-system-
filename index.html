<!DOCTYPE html>
<html>
<head>
  <title>ARISE SYSTEM</title>

  <style>
    body{
      margin:0;
      background: radial-gradient(circle at top, #001a1a, #000);
      color:#00ffcc;
      font-family:Arial;
      text-align:center;
    }

    h1{
      margin-top:15px;
      text-shadow:0 0 15px #00ffcc;
      letter-spacing:2px;
    }

    .panel{
      border:1px solid #00ffcc;
      border-radius:14px;
      margin:12px;
      padding:15px;
      box-shadow:0 0 20px #00ffcc22;
      backdrop-filter: blur(6px);
      animation: glow 3s infinite alternate;
    }

    @keyframes glow{
      from { box-shadow:0 0 10px #00ffcc22; }
      to   { box-shadow:0 0 25px #00ffcc55; }
    }

    .bar{
      width:80%;
      height:12px;
      background:#003333;
      margin:10px auto;
      border-radius:10px;
      overflow:hidden;
    }

    .fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#00ffcc,#00ffaa);
      transition:0.3s;
    }

    .quest{
      margin:6px;
      padding:10px;
      border:1px solid #00ffcc55;
      border-radius:10px;
      cursor:pointer;
      transition:0.2s;
    }

    .quest:hover{
      background:#00ffcc11;
      transform:scale(1.03);
    }

    #systemMsg{
      font-weight:bold;
      text-shadow:0 0 10px #00ffcc;
      background:#001f1f;
    }
  </style>
</head>

<body>

<h1>⚡ ARISE SYSTEM ⚡</h1>

<div class="panel" id="systemMsg">SYSTEM: BOOTING...</div>

<!-- LEVEL -->
<div class="panel">
  <h2>LEVEL <span id="level">1</span></h2>
</div>

<!-- XP BAR -->
<div class="panel">
  <h2>XP</h2>
  <div class="bar">
    <div class="fill" id="xpBar"></div>
  </div>
  <p><span id="xp">0</span> / 100</p>
</div>

<!-- STATS -->
<div class="panel">
  <h2>📊 STATS</h2>
  <p>💪 Strength: <span id="str">1</span></p>
  <p>🫀 Stamina: <span id="sta">1</span></p>
  <p>⚡ Agility: <span id="agi">1</span></p>
  <p>🔥 Streak: <span id="streak">0</span></p>
</div>

<!-- QUEST -->
<div class="panel">
  <h2>🎯 QUEST</h2>

  <div class="quest" onclick="setQuest(0.1)">
    🏃 Walk 0.1 KM
  </div>

  <div class="quest" onclick="setQuest(0.5)">
    🚶 Walk 0.5 KM
  </div>

  <div class="quest" onclick="setQuest(1)">
    🏃 Run 1 KM
  </div>
</div>

<!-- ACTIVE -->
<div class="panel">
  <h2>ACTIVE QUEST</h2>
  <p id="activeQuest">None</p>
  <p>Distance: <span id="distance">0</span> km</p>
  <p id="status">Select a quest</p>
</div>

<script>

/* ================= DATA ================= */
let xp = localStorage.getItem("xp") ? parseInt(localStorage.getItem("xp")) : 0;
let level = localStorage.getItem("level") ? parseInt(localStorage.getItem("level")) : 1;

let str = localStorage.getItem("str") ? parseInt(localStorage.getItem("str")) : 1;
let sta = localStorage.getItem("sta") ? parseInt(localStorage.getItem("sta")) : 1;
let agi = localStorage.getItem("agi") ? parseInt(localStorage.getItem("agi")) : 1;

let streak = localStorage.getItem("streak") ? parseInt(localStorage.getItem("streak")) : 0;
let lastLogin = localStorage.getItem("lastLogin") || "";

let totalDistance = localStorage.getItem("distance") ? parseFloat(localStorage.getItem("distance")) : 0;

let targetDistance = 0;
let lastPos = null;
let watchId;

/* ================= SYSTEM MSG ================= */
function systemMessage(msg){
  document.getElementById("systemMsg").innerText = "SYSTEM: " + msg;
}

/* ================= SAVE ================= */
function saveAll(){
  localStorage.setItem("xp", xp);
  localStorage.setItem("level", level);
  localStorage.setItem("str", str);
  localStorage.setItem("sta", sta);
  localStorage.setItem("agi", agi);
  localStorage.setItem("streak", streak);
  localStorage.setItem("lastLogin", lastLogin);
  localStorage.setItem("distance", totalDistance);
}

/* ================= UI ================= */
function updateUI(){
  document.getElementById("level").innerText = level;
  document.getElementById("xp").innerText = xp;

  document.getElementById("str").innerText = str;
  document.getElementById("sta").innerText = sta;
  document.getElementById("agi").innerText = agi;
  document.getElementById("streak").innerText = streak;

  document.getElementById("distance").innerText =
    totalDistance.toFixed(3);

  // XP BAR
  let percent = (xp / 100) * 100;
  document.getElementById("xpBar").style.width = percent + "%";
}

/* ================= STREAK ================= */
function checkStreak(){
  let today = new Date().toDateString();

  if(lastLogin !== today){
    streak += 1;
    lastLogin = today;

    let bonus = 10;
    if(streak >= 3) bonus = 20;
    if(streak >= 7) bonus = 50;

    xp += bonus;

    systemMessage("DAILY STREAK +" + bonus + " XP");
    saveAll();
  }
}

/* ================= QUEST ================= */
function setQuest(km){
  targetDistance = km;
  totalDistance = 0;

  saveAll();

  document.getElementById("activeQuest").innerText =
    km + " KM QUEST";

  systemMessage("QUEST INITIALIZED");
}

/* ================= DISTANCE ================= */
function getDistance(lat1, lon1, lat2, lon2){
  const R = 6371;

  const dLat = (lat2 - lat1) * Math.PI/180;
  const dLon = (lon2 - lon1) * Math.PI/180;

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  let dist = R * c;

  if(dist < 0.005) return 0;
  return dist;
}

/* ================= QUEST COMPLETE ================= */
function completeQuest(){
  xp += 50;

  str++;
  sta++;
  agi++;

  if(xp >= 100){
    xp -= 100;
    level++;
    systemMessage("LEVEL UP DETECTED ⚡");
  }

  saveAll();
  updateUI();

  systemMessage("QUEST COMPLETE ✔");
  document.getElementById("status").innerText = "Completed!";
}

/* ================= GPS ================= */
function startGPS(){
  if(!navigator.geolocation){
    alert("GPS not supported");
    return;
  }

  systemMessage("GPS ONLINE");

  watchId = navigator.geolocation.watchPosition(pos => {

    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    if(lastPos){
      let dist = getDistance(lastPos.lat, lastPos.lon, lat, lon);

      if(dist > 0 && dist < 1){
        totalDistance += dist;
        saveAll();
      }

      document.getElementById("distance").innerText =
        totalDistance.toFixed(3);

      document.getElementById("status").innerText =
        "Tracking...";
      
      if(targetDistance > 0 && totalDistance >= targetDistance){
        completeQuest();
        targetDistance = 0;
      }
    }

    lastPos = {lat, lon};

  }, err => {
    systemMessage("GPS PERMISSION REQUIRED");
  }, { enableHighAccuracy:true });
}

/* ================= INIT ================= */
updateUI();
checkStreak();
startGPS();

</script>

</body>
</html>
