<!DOCTYPE html>
<html>
<head>
  <title>ARISE SYSTEM</title>

  <style>
    body{
      margin:0;
      background: radial-gradient(circle at top, #001a1a, #000);
      color:#00ffcc;
      font-family:Arial;
      text-align:center;
      padding:15px;
    }

    h1{
      text-shadow:0 0 15px #00ffcc;
    }

    .panel{
      border:1px solid #00ffcc;
      border-radius:14px;
      margin:10px;
      padding:15px;
      box-shadow:0 0 20px #00ffcc22;
    }

    .btn{
      padding:10px;
      margin:5px;
      border:1px solid #00ffcc;
      background:transparent;
      color:#00ffcc;
      cursor:pointer;
      border-radius:8px;
    }

    .quest{
      border:1px solid #00ffcc55;
      margin:6px;
      padding:10px;
      border-radius:10px;
      cursor:pointer;
    }

    #system{
      font-weight:bold;
      background:#001f1f;
    }
  </style>
</head>

<body>

<h1>⚡ ARISE SYSTEM ⚡</h1>

<div class="panel" id="system">SYSTEM READY</div>

<button class="btn" onclick="toggleSound()">🔊 SOUND</button>

<div class="panel">
  LEVEL: <span id="level">1</span> |
  XP: <span id="xp">0</span>/100
</div>

<div class="panel">
  💪 <span id="str">1</span> |
  🫀 <span id="sta">1</span> |
  ⚡ <span id="agi">1</span> |
  🔥 <span id="streak">0</span>
</div>

<div class="panel">
  <button class="btn" onclick="selectCategory('strength')">💪 Strength</button>
  <button class="btn" onclick="selectCategory('stamina')">🫀 Stamina</button>
  <button class="btn" onclick="selectCategory('agility')">⚡ Agility</button>
</div>

<div class="panel" id="questBoard"></div>

<div class="panel">
  ACTIVE: <span id="activeQuest">None</span><br>
  <button class="btn" onclick="completeQuest()">COMPLETE QUEST</button>
</div>

<!-- AUDIO -->
<audio id="sfxComplete" src="https://www.myinstants.com/media/sounds/success.mp3"></audio>
<audio id="sfxLevel" src="https://www.myinstants.com/media/sounds/level-up.mp3"></audio>
<audio id="sfxClick" src="https://www.myinstants.com/media/sounds/click.mp3"></audio>

<script>

/* DATA */
let xp = parseInt(localStorage.getItem("xp")) || 0;
let level = parseInt(localStorage.getItem("level")) || 1;

let str = parseInt(localStorage.getItem("str")) || 1;
let sta = parseInt(localStorage.getItem("sta")) || 1;
let agi = parseInt(localStorage.getItem("agi")) || 1;

let streak = parseInt(localStorage.getItem("streak")) || 0;
let lastLogin = localStorage.getItem("lastLogin") || "";

let selectedCategory = localStorage.getItem("category") || "";
let activeQuest = localStorage.getItem("activeQuest") || "";
let questBoard = JSON.parse(localStorage.getItem("questBoard")) || [];

/* SOUND */
let soundEnabled = true;

function playSound(id){
  if(!soundEnabled) return;
  let s = document.getElementById(id);
  if(s){
    s.currentTime = 0;
    s.play();
  }
}

function toggleSound(){
  soundEnabled = !soundEnabled;
  alert(soundEnabled ? "Sound ON" : "Sound OFF");
}

/* SYSTEM */
function system(msg){
  document.getElementById("system").innerText = msg;
  playSound("sfxClick");
}

/* SAVE */
function save(){
  localStorage.setItem("xp", xp);
  localStorage.setItem("level", level);
  localStorage.setItem("str", str);
  localStorage.setItem("sta", sta);
  localStorage.setItem("agi", agi);
  localStorage.setItem("streak", streak);
  localStorage.setItem("lastLogin", lastLogin);
  localStorage.setItem("category", selectedCategory);
  localStorage.setItem("activeQuest", activeQuest);
  localStorage.setItem("questBoard", JSON.stringify(questBoard));
}

/* UI */
function updateUI(){
  document.getElementById("xp").innerText = xp;
  document.getElementById("level").innerText = level;
  document.getElementById("str").innerText = str;
  document.getElementById("sta").innerText = sta;
  document.getElementById("agi").innerText = agi;
  document.getElementById("streak").innerText = streak;
  document.getElementById("activeQuest").innerText = activeQuest || "None";
}

/* DIFFICULTY */
function scale(base){
  return Math.floor(base + level * 0.2 * base);
}

/* QUESTS */
function getQuests(type){

  if(type==="strength"){
    return [
      "Push-ups ("+scale(10)+" reps)",
      "Squats ("+scale(15)+" reps)",
      "Plank ("+scale(30)+" sec)"
    ];
  }

  if(type==="stamina"){
    return [
      "Jog "+(0.3+level*0.05).toFixed(1)+" km",
      "Walk "+(0.5+level*0.1).toFixed(1)+" km"
    ];
  }

  if(type==="agility"){
    return [
      "Sprint drills",
      "Jump training",
      "Speed walk"
    ];
  }
}

/* CATEGORY */
function selectCategory(cat){
  selectedCategory = cat;
  system("PATH: "+cat.toUpperCase());
  generateBoard();
  save();
}

/* BOARD */
function generateBoard(){
  let pool = getQuests(selectedCategory);
  questBoard = [];

  for(let i=0;i<3;i++){
    let q = pool[Math.floor(Math.random()*pool.length)];
    questBoard.push(q);
  }

  renderBoard();
}

/* RENDER */
function renderBoard(){
  let html="";
  questBoard.forEach((q,i)=>{
    html+=`<div class="quest" onclick="startQuest(${i})">${q}</div>`;
  });
  document.getElementById("questBoard").innerHTML=html;
}

/* START QUEST */
function startQuest(i){
  activeQuest = questBoard[i];
  system("QUEST STARTED");
  playSound("sfxClick");
  save();
  updateUI();
}

/* COMPLETE */
function completeQuest(){

  if(!activeQuest) return;

  xp+=50;

  if(selectedCategory==="strength") str++;
  if(selectedCategory==="stamina") sta++;
  if(selectedCategory==="agility") agi++;

  if(xp>=100){
    xp-=100;
    level++;
    playSound("sfxLevel");
    system("LEVEL UP!");
  }

  playSound("sfxComplete");

  activeQuest="";
  generateBoard();

  save();
  updateUI();
}

/* STREAK */
function checkStreak(){
  let today=new Date().toDateString();
  if(lastLogin!==today){
    streak++;
    lastLogin=today;
    xp+=10;
    system("STREAK +10 XP");
    save();
  }
}

/* INIT */
checkStreak();
updateUI();
renderBoard();

</script>

</body>
</html>
