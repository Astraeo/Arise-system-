<!DOCTYPE html>
<html>
<head>
  <title>ARISE SYSTEM</title>
  <style>
    body{
      background:#000;
      color:#00ffcc;
      font-family:Arial;
      text-align:center;
      padding:20px;
    }

    h1{
      margin-bottom:10px;
    }

    .panel{
      border:1px solid #00ffcc;
      border-radius:12px;
      margin:10px;
      padding:15px;
      box-shadow:0 0 10px #00ffcc33;
    }

    .quest{
      margin:5px;
      padding:10px;
      border:1px solid #00ffcc55;
      border-radius:8px;
      cursor:pointer;
    }

    button{
      background:#00ffcc;
      border:none;
      padding:10px;
      margin:5px;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>

<body>

<h1>⚡ ARISE SYSTEM ⚡</h1>

<!-- LEVEL + XP -->
<div class="panel">
  <h2>LEVEL: <span id="level">1</span></h2>
  <h2>XP: <span id="xp">0</span> / 100</h2>
</div>

<!-- STATS -->
<div class="panel">
  <h2>📊 STATS</h2>
  <p>💪 Strength: <span id="str">1</span></p>
  <p>🫀 Stamina: <span id="sta">1</span></p>
  <p>⚡ Agility: <span id="agi">1</span></p>
  <p>🔥 Streak: <span id="streak">0</span> days</p>
</div>

<!-- QUESTS -->
<div class="panel">
  <h2>🎯 QUEST SELECT</h2>

  <div class="quest" onclick="setQuest(0.1)">
    🏃 Walk 0.1 KM
  </div>

  <div class="quest" onclick="setQuest(0.5)">
    🚶 Walk 0.5 KM
  </div>

  <div class="quest" onclick="setQuest(1)">
    🏃 Run 1 KM
  </div>
</div>

<!-- ACTIVE -->
<div class="panel">
  <h2>ACTIVE QUEST</h2>
  <p id="activeQuest">None</p>
  <p>Distance: <span id="distance">0</span> km</p>
  <p id="status">Select a quest</p>
</div>

<script>

/* ================= LOAD DATA ================= */
let xp = localStorage.getItem("xp") ? parseInt(localStorage.getItem("xp")) : 0;
let level = localStorage.getItem("level") ? parseInt(localStorage.getItem("level")) : 1;

let str = localStorage.getItem("str") ? parseInt(localStorage.getItem("str")) : 1;
let sta = localStorage.getItem("sta") ? parseInt(localStorage.getItem("sta")) : 1;
let agi = localStorage.getItem("agi") ? parseInt(localStorage.getItem("agi")) : 1;

let streak = localStorage.getItem("streak") ? parseInt(localStorage.getItem("streak")) : 0;
let lastLogin = localStorage.getItem("lastLogin") || "";

let totalDistance = localStorage.getItem("distance") ? parseFloat(localStorage.getItem("distance")) : 0;

/* ================= QUEST DATA ================= */
let targetDistance = 0;
let lastPos = null;
let watchId;

/* ================= SAVE ================= */
function saveAll(){
  localStorage.setItem("xp", xp);
  localStorage.setItem("level", level);
  localStorage.setItem("str", str);
  localStorage.setItem("sta", sta);
  localStorage.setItem("agi", agi);
  localStorage.setItem("streak", streak);
  localStorage.setItem("lastLogin", lastLogin);
  localStorage.setItem("distance", totalDistance);
}

/* ================= UI ================= */
function updateUI(){
  document.getElementById("xp").innerText = xp;
  document.getElementById("level").innerText = level;

  document.getElementById("str").innerText = str;
  document.getElementById("sta").innerText = sta;
  document.getElementById("agi").innerText = agi;

  document.getElementById("streak").innerText = streak;

  document.getElementById("distance").innerText =
    totalDistance.toFixed(3);
}

/* ================= STREAK SYSTEM ================= */
function checkStreak(){
  let today = new Date().toDateString();

  if(lastLogin !== today){
    streak += 1;
    lastLogin = today;

    let bonus = 10;

    if(streak >= 3) bonus = 20;
    if(streak >= 7) bonus = 50;

    xp += bonus;

    alert("🔥 DAILY STREAK BONUS: +" + bonus + " XP!");

    saveAll();
  }
}

/* ================= QUEST SELECT ================= */
function setQuest(km){
  targetDistance = km;
  totalDistance = 0;

  saveAll();

  document.getElementById("activeQuest").innerText =
    "Complete " + km + " KM QUEST";

  document.getElementById("status").innerText =
    "Quest started... Move!";
}

/* ================= DISTANCE ================= */
function getDistance(lat1, lon1, lat2, lon2){
  const R = 6371;

  const dLat = (lat2 - lat1) * Math.PI/180;
  const dLon = (lon2 - lon1) * Math.PI/180;

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  let dist = R * c;

  if(dist < 0.005) return 0;
  return dist;
}

/* ================= QUEST COMPLETE ================= */
function completeQuest(){
  xp += 50;

  str += 1;
  sta += 1;
  agi += 1;

  if(xp >= 100){
    xp -= 100;
    level++;
    alert("LEVEL UP!");
  }

  saveAll();
  updateUI();

  document.getElementById("status").innerText =
    "QUEST COMPLETE!";
}

/* ================= GPS ================= */
function startGPS(){
  if(!navigator.geolocation){
    alert("GPS not supported");
    return;
  }

  watchId = navigator.geolocation.watchPosition(pos => {

    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    if(lastPos){
      let dist = getDistance(lastPos.lat, lastPos.lon, lat, lon);

      if(dist > 0 && dist < 1){
        totalDistance += dist;
        saveAll();
      }

      document.getElementById("distance").innerText =
        totalDistance.toFixed(3);

      document.getElementById("status").innerText =
        "Tracking... Keep moving 👣";

      if(targetDistance > 0 && totalDistance >= targetDistance){
        completeQuest();
        targetDistance = 0;
      }
    }

    lastPos = {lat, lon};

  }, err => {
    document.getElementById("status").innerText =
      "Enable GPS permission!";
  }, { enableHighAccuracy:true });
}

/* ================= INIT ================= */
updateUI();
checkStreak();
startGPS();

</script>

</body>
</html>
